<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPrep Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="auth-wrap">

<div class="auth-box">

<div class="card">

<h1>Welcome Back</h1>

<p class="sub-text">
Login to continue your AI-powered learning journey.
</p>

<form onsubmit="login(event)">

<input
type="email"
id="email"
class="side-input"
placeholder="Enter Email Address"
required
>

<input
type="password"
id="password"
class="side-input"
placeholder="Enter Password"
required
>

<button type="submit">
Launch Dashboard
</button>

</form>

<p style="margin-top:18px;text-align:center;color:#bdbdbd;">

No account?

<a href="signup.html">
Create One
</a>

</p>

</div>

<div class="card">

<h2>Gemini API Key</h2>

<p class="sub-text" style="margin-bottom:0;">
No API key needed here.<br>
After login, open the Tutor page sidebar and enter your Gemini API key there.
</p>

</div>

</div>

</section>

<script src="js/auth.js"></script>

</body>
</html>
