<div class="tutor-layout">

<div class="chat-panel">

<h1>AI Tutor</h1>

<div id="chatBox" class="chat-box"></div>

<div class="chat-input-area">
<input type="text" id="userInput" placeholder="Ask study question...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<div class="side-panel">

<div class="mini-card">
<h3>Prompt Coach</h3>
<p id="clarity">Clarity: 0%</p>
<p id="depth">Depth: 0%</p>
<p id="specificity">Specificity: 0%</p>
</div>

<div class="mini-card">
<h3>Quick Prompts</h3>
<p>Explain recursion</p>
<p>DSA roadmap</p>
<p>JavaScript basics</p>
<p>Node.js intro</p>
</div>

</div>

</div>
