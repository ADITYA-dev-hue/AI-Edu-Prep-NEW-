<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPrep Signup</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">

<form class="auth-form" onsubmit="signup(event)">

<h1>Create Account</h1>

<p style="
color:#a5a5a5;
margin-bottom:22px;
text-align:center;
line-height:1.6;
">
Join EduPrep and unlock AI-powered study tools.
</p>

<input
type="email"
id="email"
placeholder="Enter Email"
required
>

<input
type="password"
id="password"
placeholder="Create Password"
required
>

<input
type="password"
id="apikey"
placeholder="Enter Gemini API Key"
required
>

<button type="submit">
Create Account
</button>

<p style="margin-top:18px;text-align:center;">

Already have an account?

<a href="login.html" style="color:#ff5a00;">
Login
</a>

</p>

</form>

</div>

<script src="js/auth.js"></script>

</body>
</html>
