<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPrep Signup</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="page-wrap" style="max-width:520px;margin:auto;padding-top:90px;">

<div class="card">

<h1 style="font-size:38px;text-align:center;">Create Account</h1>

<p class="sub-text" style="text-align:center;">
Join EduPrep and start AI-powered learning.
</p>

<form onsubmit="signup(event)">

<input
type="email"
id="email"
placeholder="Enter Email"
class="side-input"
style="margin-bottom:14px;"
required
>

<input
type="password"
id="password"
placeholder="Create Password"
class="side-input"
style="margin-bottom:18px;"
required
>

<button
type="submit"
class="side-save"
style="width:100%;"
>
Create Account
</button>

</form>

<p style="margin-top:18px;text-align:center;color:#bdbdbd;">
Already have an account?
<a href="login.html" style="color:#ff5a00;text-decoration:none;">
Login
</a>
</p>

</div>

<div class="card">

<h2>Gemini API Key</h2>

<p style="line-height:1.8;color:#d0d0d0;">
You do not need an API key during signup.<br>
After login, open Tutor page sidebar and save your Gemini key there.
</p>

</div>

</section>

<script src="js/auth.js"></script>

</body>
</html>
