<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduPrep Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="grid-bg"></div>

<div class="auth-container">

  <div class="auth-left">
    <h1>EduPrep <span>V3</span></h1>
    <h2>Study sharper.<br>Think in systems.</h2>
    <p>
      AI-powered academic platform for students,
      coders, and future builders.
    </p>

    <div class="feature-box">
      <div>24/7 AI Tutor</div>
      <div>Study Analytics</div>
      <div>Smart Learning Paths</div>
    </div>
  </div>

  <div class="auth-right">

    <form action="/login" method="POST" class="auth-form">

      <h2>Login</h2>

      <input
        type="email"
        name="email"
        placeholder="Email Address"
        required
      />

      <input
        type="password"
        name="password"
        placeholder="Password"
        required
      />

      <input
        type="password"
        name="apikey"
        placeholder="Enter Gemini API Key"
        required
      />

      <button type="submit">Launch Dashboard</button>

      <p class="switch-text">
        New here?
        <a href="signup.html">Create Account</a>
      </p>

    </form>

  </div>

</div>

</body>
</html>
